name: Build Fixiqo Installers

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # =========================================================
  # WINDOWS
  # =========================================================

  build-windows:
    runs-on: windows-latest

    steps:

      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Install WiX Toolset
        run: choco install wixtoolset --yes

      - name: Build fat jar
        shell: powershell
        run: |
          mvn -B clean package -DskipTests

      # ---------------- EXE ----------------

      - name: Build EXE installer
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist

          jpackage `
            --type exe `
            --name "Fixiqo" `
            --app-version "1.0.0" `
            --vendor "Defragler" `
            --description "Fixiqo Desktop Application" `
            --input target `
            --main-jar Fixiqo-fat.jar `
            --main-class com.defragler.fixiqo.Launcher `
            --dest dist `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut

      - name: Rename EXE
        shell: powershell
        run: |
          Get-ChildItem dist\*.exe | Rename-Item -NewName "Fixiqo-Windows.exe"

      # ---------------- MSI ----------------

      - name: Build MSI installer
        shell: powershell
        run: |
          jpackage `
            --type msi `
            --name "Fixiqo" `
            --app-version "1.0.0" `
            --vendor "Defragler" `
            --description "Fixiqo Desktop Application" `
            --input target `
            --main-jar Fixiqo-fat.jar `
            --main-class com.defragler.fixiqo.Launcher `
            --dest dist `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut

      - name: Rename MSI
        shell: powershell
        run: |
          Get-ChildItem dist\*.msi | Rename-Item -NewName "Fixiqo-Windows.msi"

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: Fixiqo-Windows
          path: |
            dist/*.exe
            dist/*.msi
          compression-level: 0

  # =========================================================
  # MACOS INTEL
  # =========================================================

  build-macos-intel:
    runs-on: macos-15-intel

    steps:

      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build fat jar
        run: |
          mvn -B clean package -DskipTests

      - name: Build Intel DMG
        run: |
          mkdir -p dist

          jpackage \
            --type dmg \
            --name "Fixiqo" \
            --app-version "1.0" \
            --vendor "defragler" \
            --input target/ \
            --main-jar Fixiqo-fat.jar \
            --main-class com.defragler.fixiqo.Launcher \
            --icon src/main/resources/icons/logo.icns \
            --dest dist/ \
            --mac-package-name "Fixiqo" \
            --mac-package-identifier "com.defragler.fixiqo"

      - name: Rename Intel installer
        run: |
          mv dist/*.dmg dist/Fixiqo-macOS-Intel.dmg

      - name: Upload Intel macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: Fixiqo-macOS-Intel
          path: dist/Fixiqo-macOS-Intel.dmg
          compression-level: 0

  # =========================================================
  # MACOS APPLE SILICON
  # =========================================================

  build-macos-apple-silicon:
    runs-on: macos-14

    steps:

      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build fat jar
        run: |
          mvn -B clean package -DskipTests

      - name: Build Apple Silicon DMG
        run: |
          mkdir -p dist

          jpackage \
            --type dmg \
            --name "Fixiqo" \
            --app-version "1.0" \
            --vendor "defragler" \
            --input target/ \
            --main-jar Fixiqo-fat.jar \
            --main-class com.defragler.fixiqo.Launcher \
            --icon src/main/resources/icons/logo.icns \
            --dest dist/ \
            --mac-package-name "Fixiqo" \
            --mac-package-identifier "com.defragler.fixiqo"

      - name: Rename Apple Silicon installer
        run: |
          mv dist/*.dmg dist/Fixiqo-macOS-AppleSilicon.dmg

      - name: Upload Apple Silicon installer
        uses: actions/upload-artifact@v4
        with:
          name: Fixiqo-macOS-AppleSilicon
          path: dist/Fixiqo-macOS-AppleSilicon.dmg
          compression-level: 0

  # =========================================================
  # LINUX
  # =========================================================

  build-linux:
    runs-on: ubuntu-22.04

    steps:

      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Install Linux dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            fakeroot \
            dpkg-dev \
            rpm \
            libfuse2

      - name: Build fat jar
        run: |
          mvn -B clean package -DskipTests

      # ---------------- DEB ----------------

      - name: Build DEB installer
        run: |
          mkdir -p dist

          jpackage \
            --type deb \
            --name "Fixiqo" \
            --app-version "1.0" \
            --vendor "defragler" \
            --input target \
            --main-jar Fixiqo-fat.jar \
            --main-class com.defragler.fixiqo.Launcher \
            --dest dist \
            --icon src/main/resources/icons/logo.png \
            --linux-package-name "fixiqo" \
            --linux-app-category "Utility" \
            --linux-shortcut
          
      # ---------------- APP IMAGE ----------------

      - name: Build App Image
        run: |
          jpackage \
            --type app-image \
            --name "Fixiqo" \
            --input target \
            --main-jar Fixiqo-fat.jar \
            --main-class com.defragler.fixiqo.Launcher \
            --dest dist \
            --icon src/main/resources/icons/logo.png

      - name: Upload Linux installers
        uses: actions/upload-artifact@v4
        with:
          name: Fixiqo-Linux
          path: |
            dist/*.deb
            dist/Fixiqo
          compression-level: 0