name: Build Fixiqo Installers

on:
  workflow_dispatch:

  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:

  # =========================================================
  # WINDOWS
  # =========================================================

  build-windows:
    runs-on: windows-latest

    steps:

      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Install WiX Toolset
        run: choco install wixtoolset --yes

      - name: Build fat jar
        shell: powershell
        run: |
          mvn -B clean package -DskipTests

      # ---------------- EXE ----------------

      - name: Build EXE installer
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist

          jpackage `
            --type exe `
            --name "Fixiqo" `
            --app-version "1.0.0" `
            --vendor "Defragler" `
            --description "Fixiqo Desktop Application" `
            --input target `
            --main-jar Fixiqo-fat.jar `
            --main-class com.defragler.fixiqo.Launcher `
            --dest dist `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut

      - name: Rename EXE
        shell: powershell
        run: |
          Get-ChildItem dist\*.exe | Rename-Item -NewName "Fixiqo-Windows.exe"

      # ---------------- MSI ----------------

      - name: Build MSI installer
        shell: powershell
        run: |
          jpackage `
            --type msi `
            --name "Fixiqo" `
            --app-version "1.0.0" `
            --vendor "Defragler" `
            --description "Fixiqo Desktop Application" `
            --input target `
            --main-jar Fixiqo-fat.jar `
            --main-class com.defragler.fixiqo.Launcher `
            --dest dist `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut

      - name: Rename MSI
        shell: powershell
        run: |
          Get-ChildItem dist\*.msi | Rename-Item -NewName "Fixiqo-Windows.msi"

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: Fixiqo-Windows
          path: |
            dist/*.exe
            dist/*.msi
          compression-level: 0

  # =========================================================
  # MACOS INTEL
  # =========================================================

  build-macos:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: macos-13
            arch: intel
          - os: macos-14
            arch: arm

    steps:

      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build fat jar
        run: mvn -B clean package -DskipTests

      - name: Build DMG
        run: |
          mkdir -p dist

          jpackage \
            --type dmg \
            --name "Fixiqo" \
            --app-version "1.0" \
            --vendor "defragler" \
            --input target/ \
            --main-jar Fixiqo-fat.jar \
            --main-class com.defragler.fixiqo.Launcher \
            --icon src/main/resources/icons/logo.icns \
            --dest dist/ \
            --mac-package-name "Fixiqo" \
            --mac-package-identifier "com.defragler.fixiqo"

      - name: Rename installer
        run: |
          mv dist/*.dmg dist/Fixiqo-macOS-${{ matrix.arch }}.dmg

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: Fixiqo-macOS-${{ matrix.arch }}
          path: dist/*.dmg
          compression-level: 0

  # =========================================================
  # LINUX
  # =========================================================

  build-linux:
    runs-on: ubuntu-22.04

    steps:

      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Install Linux dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            fakeroot \
            dpkg-dev \
            rpm \
            libfuse2

      - name: Build fat jar
        run: |
          mvn -B clean package -DskipTests

      # ---------------- DEB ----------------

      - name: Build DEB installer
        run: |
          mkdir -p dist

          jpackage \
            --type deb \
            --name "Fixiqo" \
            --app-version "1.0" \
            --vendor "defragler" \
            --input target \
            --main-jar Fixiqo-fat.jar \
            --main-class com.defragler.fixiqo.Launcher \
            --dest dist \
            --icon src/main/resources/icons/logo.png \
            --linux-package-name "fixiqo" \
            --linux-app-category "Utility" \
            --linux-shortcut
          
      # ---------------- APP IMAGE ----------------

      - name: Build App Image
        run: |
          jpackage \
            --type app-image \
            --name "Fixiqo" \
            --input target \
            --main-jar Fixiqo-fat.jar \
            --main-class com.defragler.fixiqo.Launcher \
            --dest dist \
            --icon src/main/resources/icons/logo.png

      - name: Upload Linux installers
        uses: actions/upload-artifact@v4
        with:
          name: Fixiqo-Linux
          path: |
            dist/*.deb
            dist/Fixiqo
          compression-level: 0

  # =========================================================
  # RELEASE
  # =========================================================

  publish-release:

    needs:
      - build-windows
      - build-macos
      - build-linux

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: installers
          merge-multiple: true

      - name: Show downloaded files
        run: |
          ls -la installers

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Fixiqo ${{ github.ref_name }}"
          body: |
            ## Fixiqo ${{ github.ref_name }}

            Desktop installers for multiple platforms.

            ### Included installers

            | Platform | File |
            |---|---|
            | Windows | `.exe` |
            | Windows MSI | `.msi` |
            | macOS Intel | `.dmg` |
            | macOS Apple Silicon | `.dmg` |
            | Linux Ubuntu/Debian | `.deb` |
            | Linux App Image | `app-image` |

          files: installers/*
          draft: false
          prerelease: false